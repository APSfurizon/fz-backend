<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="supported-color-schemes" content="light dark">
    <style media="all" type="text/css">
        * { color: #bbc6ce; }
        .body { width: 100%; margin: 0; background-color: #11191f; }
        .container { max-width: 40em; padding: 1em; margin: 0 auto; }
        .title { font-size: 1.75em; margin-bottom: 1.2em; color: #e1e6eb; margin-top: 0; font-family: sans-serif; }
        .main-content { margin-top: 0; font-style: normal; font-weight: 400; font-family: sans-serif;}
        .con-logo { height:3em;}
        .link { color: #fff; font-weight: 600; font-size: medium; background-color: #00000000 }
    </style>
</head>
<div class="body">
    <div class="container">
        <img src="https://fzbe.furizon.net/res/furizon.png" alt="con_logo" title="con_logo" class="con-logo">
        <h2 class="title">Membership card</h2>
        <p class="main-content">Here's your membership card:</p>
        <div style="background-color: #ffffff; border: 0.25em solid #2479b9; width: 80%; margin: 1.25em 0; padding: 2em; box-sizing: border-box; font-family: sans-serif; color: #000000; border-radius: 10px">

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 3.75em;">
                <tr>
                    <td align="left" valign="top" style="color: #000000; white-space: nowrap;">
                        <div style="font-size: 1.75em; font-weight: bold; color: #000000;">ROSSI</div>
                        <div style="font-size: 1.75em; font-weight: bold; margin-bottom: 0.6em; color: #000000;">LUCA</div>
                        <div style="font-size: 1em; line-height: 1.5; color: #000000;">CF: AABBCCDD</div>
                        <div style="font-size: 1em; line-height: 1.5; color: #000000;">Data N. 01/01/1970</div>
                    </td>
                    <td align="right" valign="top" width="50%" style="padding: 0; vertical-align: top; text-align: right;">
                        <img src="https://furpanel.furizon.net/images/logo-light.png" alt="Logo" style="max-width: 100%; height: auto; display: inline-block; border: 0; vertical-align: top; margin: 0;">
                    </td>
                </tr>
            </table>

            <div style="color: #000000; font-size: 1.15em">
                Scad. Tess.: 30/09/2026
            </div>

            <div style="color: #000000; font-weight: bold; font-size: 1.15em; font-variant-numeric: tabular-nums;">
                2526001
            </div>

        </div>
    </div>
</div>
</html>
